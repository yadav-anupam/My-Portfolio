<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
  }

 body{

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  padding:20px;

  background:
  radial-gradient(circle at top left,#8b5cf620,transparent 40%),
  radial-gradient(circle at bottom right,#6366f120,transparent 40%),
  #0f172a;

    background:
    radial-gradient(circle at top left,#8b5cf620,transparent 40%),
    radial-gradient(circle at bottom right,#6366f120,transparent 40%),
    #0f172a;

    overflow:hidden;
  }

 .login-card{

  width:min(90vw,400px);

  padding:28px;

  border-radius:24px;

  background:
  rgba(255,255,255,.05);

  backdrop-filter:blur(20px);

  border:
  1px solid rgba(255,255,255,.08);

  box-shadow:
  0 20px 50px rgba(0,0,0,.35);
}

  .logo{
    font-size:40px;
    text-align:center;
    margin-bottom:15px;
  }

  h1{
    text-align:center;
    color:white;
    margin-bottom:10px;
  }

  .sub{
    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;
  }

  #logoutMessage{
    text-align:center;
    color:#22c55e;
    margin-bottom:15px;
  }

  input{

    width:100%;
    padding:12px 14px;
    font-size:15px;

    border-radius:12px;

    border:1px solid rgba(255,255,255,.08);

    background:
    rgba(255,255,255,.05);

    color:white;

    outline:none;

    margin-bottom:15px;
  }

  input::placeholder{
    color:#94a3b8;
  }

  #loginBtn{

    width:100%;

    padding: 13px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    color:white;

    font-size:16px;

    font-weight:600;

    transition:.3s;

    background:
    linear-gradient(
      135deg,
      #8b5cf6,
      #6366f1
    );
  }

  #loginBtn:hover{
    transform:translateY(-2px);
    transition:.3s;
  }

  @media(max-width:768px){

  h1{
    font-size:38px;
  }

  .logo{
    font-size:32px;
  }

  .sub{
    font-size:15px;
  }

}

  .footer{
    margin-top:20px;
    text-align:center;
    color:#94a3b8;
    font-size:14px;
  }

  </style>
</head>
<div class="login-card">

  <div class="logo">⚡</div>

  <h1>Admin Portal</h1>

  <p class="sub">
    Secure access to your portfolio dashboard
  </p>

  <p id="logoutMessage"></p>

  <input
    type="email"
    id="email"
    placeholder="Enter Email">

  <input
    type="password"
    id="password"
    placeholder="Enter Password">

  <button id="loginBtn">
    Login
  </button>

  <div class="footer">
    Anupam Portfolio Login Page!
  </div>

</div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  setPersistence,
  browserSessionPersistence
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQoVoewyuS_WIGSJmVQzW-MThzxyIKvSg",
  authDomain: "anupam-yadav-portfolio.firebaseapp.com",
  projectId: "anupam-yadav-portfolio",
  storageBucket: "anupam-yadav-portfolio.firebasestorage.app",
  messagingSenderId: "46105414968",
  appId: "1:46105414968:web:94a16631d4e852904085cd"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

document
.getElementById("loginBtn")
.addEventListener(
"click",
async () => {

  const email =
  document.getElementById("email").value;

  const password =
  document.getElementById("password").value;

  try {

    await setPersistence(
  auth,
  browserSessionPersistence
);

    await signInWithEmailAndPassword(
  auth,
  email,
  password
);

sessionStorage.setItem(
  "loginMessage",
  "Welcome back, Anupam!"
);

window.location.href = "admin.html";

  } catch(error) {

    alert(error.message);

  }

});

const logoutMessage =
sessionStorage.getItem("logoutMessage");

if (logoutMessage) {

  document.getElementById("logoutMessage").innerText =
    logoutMessage;

  sessionStorage.removeItem("logoutMessage");

}
</script>

</body>
</html>
